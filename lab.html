<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio - Volver a Sentir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <header class="mobile-header flex items-center justify-between px-4 py-3 fixed top-0 w-full z-40 bg-surface border-b lg:hidden">
    <div class="flex items-center gap-2">
      <button id="btn-toggle-sidebar-all" class="btn-icon">
        <i data-lucide="menu"></i>
      </button>
      <i data-lucide="shield" class="text-primary"></i><span class="font-bold text-small">Volver a Sentir</span>
    </div>
  </header>

  <aside id="sidebar" class="sidebar fixed top-0 left-0 h-screen z-50 bg-surface border-r transition-all duration-300 transform -translate-x-full lg:translate-x-0 w-64 flex flex-col">
    <div class="p-6 border-b flex items-center justify-between">
      <div class="flex items-center gap-2"><i data-lucide="shield" class="text-primary" style="width:24px"></i><span class="font-bold text-title">SISTEMA</span></div>
      <button id="btn-collapse-sidebar" class="btn-icon"><i data-lucide="chevron-left"></i></button>
    </div>
    <nav class="flex-1 overflow-y-auto p-4 flex flex-col gap-2">
      <a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i> El Mapa</a>
      <a href="missions.html" class="nav-item"><i data-lucide="target"></i> Misiones</a>
      <a href="victories.html" class="nav-item"><i data-lucide="flag"></i> Mini Victorias</a>
      <a href="areas.html" class="nav-item"><i data-lucide="activity"></i> Áreas de Vida</a>
      <a href="identity.html" class="nav-item"><i data-lucide="user"></i> Identidad</a>
      <a href="lab.html" class="nav-item active"><i data-lucide="brain"></i> Laboratorio</a>
      <a href="resurrection.html" class="nav-item"><i data-lucide="bar-chart-2"></i> Resurrección</a>
      <div class="mt-auto pt-4 border-t border-border-color"><a href="war.html" class="nav-item text-red"><i data-lucide="sword"></i> Modo Guerra</a></div>
    </nav>
  </aside>

  <div class="container sidebar-open-padding pt-20 lg:pt-8" id="main-container">
    <header class="mb-8">
      <h1 class="text-huge">LABORATORIO DE IDEAS</h1>
      <p class="text-muted">Descarga tu energía mental. Dibuja o escribe sin filtros.</p>
    </header>

    <div class="max-w-4xl">
      <div id="lab-section" class="card">
        <div class="flex justify-between items-center mb-4">
          <h3 class="card-title flex items-center gap-2"><i data-lucide="brain"></i> Descarga Mental</h3>
          <div class="flex gap-2">
            <button id="btn-mode-text" class="btn-icon active"><i data-lucide="type" style="width:16px"></i></button>
            <button id="btn-mode-draw" class="btn-icon"><i data-lucide="pen-tool" style="width:16px"></i></button>
          </div>
        </div>
        <div id="lab-text-container">
          <textarea id="lab-textarea" class="w-full textarea text-small font-mono" rows="10" placeholder="Tira tus ideas aquí..." oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
          <button class="btn btn-primary w-full mt-3" id="btn-save-lab">Guardar en el Laboratorio</button>
        </div>
        <div id="lab-draw-container" class="hidden">
          <div class="flex items-center justify-between mb-3 px-2">
            <div class="flex gap-2">
              <button class="tool-btn active" id="btn-tool-pen" title="Lápiz"><i data-lucide="pen"></i></button>
              <button class="tool-btn" id="btn-tool-eraser" title="Goma de borrar"><i data-lucide="eraser"></i></button>
            </div>
            <div class="flex gap-2" id="color-palette">
              <div class="color-btn active" style="background: #ffffff;" data-color="#ffffff"></div>
              <div class="color-btn" style="background: #4285f4;" data-color="#4285f4"></div>
              <div class="color-btn" style="background: #ea4335;" data-color="#ea4335"></div>
              <div class="color-btn" style="background: #fbbc05;" data-color="#fbbc05"></div>
              <div class="color-btn" style="background: #34a853;" data-color="#34a853"></div>
            </div>
          </div>
          <div class="canvas-container mb-2" style="height: 500px;"><canvas id="lab-canvas"></canvas></div>
          <div class="flex gap-2">
            <button class="btn btn-outline flex-1" id="btn-clear-canvas"><i data-lucide="trash-2" style="width:14px"></i> Limpiar</button>
            <button class="btn btn-primary flex-1" id="btn-save-draw"><i data-lucide="download" style="width:14px"></i> Guardar Imagen</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Identificador oculto para que el JS sepa que estamos en el LAB -->
  <div id="lab-page-marker" style="display:none"></div>

  <div id="gemini-panel" class="gemini-panel fixed bottom-6 right-6 z-40">
    <button id="btn-gemini-toggle" class="btn-gemini shadow-lg"><i data-lucide="sparkles"></i><span>Asistente AI</span></button>
    <div id="gemini-chat" class="gemini-chat hidden card shadow-xl">
      <div class="card-header flex justify-between items-center">
        <h3 class="card-title flex items-center gap-2"><i data-lucide="sparkles"></i> Gemini AI</h3>
        <button id="btn-close-gemini" class="btn-icon"><i data-lucide="x"></i></button>
      </div>
      <div id="chat-messages" class="chat-messages p-4 flex flex-col gap-3 overflow-y-auto h-80"></div>
      <div class="p-3 border-t"><div class="flex gap-2">
        <input type="text" id="chat-input" class="textarea flex-1 text-small" placeholder="Preguntar a Gemini...">
        <button id="btn-chat-send" class="btn btn-primary"><i data-lucide="send" style="width:16px"></i></button>
      </div></div>
    </div>
  </div>

  <div id="loading" class="flex items-center justify-center h-screen w-full fixed top-0 left-0 bg-base z-50"><i data-lucide="loader-2" class="spin text-muted" style="width: 48px; height: 48px;"></i></div>
  <script type="module" src="app.js"></script>
</body>
</html>
