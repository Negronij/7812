<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Misiones - Volver a Sentir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- MOBILE HEADER -->
  <header class="mobile-header flex items-center justify-between px-4 py-3 fixed top-0 w-full z-40 bg-surface border-b">
    <div class="flex items-center gap-2">
      <button id="btn-toggle-sidebar-all" class="btn-icon">
        <i data-lucide="menu"></i>
      </button>
      <i data-lucide="shield" class="text-primary"></i>
      <span class="font-bold text-small">Volver a Sentir</span>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar fixed top-0 left-0 h-screen z-50 bg-surface border-r transition-all duration-300 transform -translate-x-full lg:translate-x-0 w-64 flex flex-col">
    <div class="p-6 border-b flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i data-lucide="shield" class="text-primary" style="width:24px"></i>
        <span class="font-bold text-title">SISTEMA</span>
      </div>
      <button id="btn-collapse-sidebar" class="btn-icon">
        <i data-lucide="chevron-left"></i>
      </button>
    </div>
    <nav class="flex-1 overflow-y-auto p-4 flex flex-col gap-2">
      <a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i> El Mapa</a>
      <a href="missions.html" class="nav-item active"><i data-lucide="target"></i> Misiones</a>
      <a href="victories.html" class="nav-item"><i data-lucide="flag"></i> Mini Victorias</a>
      <a href="areas.html" class="nav-item"><i data-lucide="activity"></i> Áreas de Vida</a>
      <a href="identity.html" class="nav-item"><i data-lucide="user"></i> Identidad</a>
      <a href="lab.html" class="nav-item"><i data-lucide="brain"></i> Laboratorio</a>
      <a href="resurrection.html" class="nav-item"><i data-lucide="bar-chart-2"></i> Resurrección</a>
      <div class="mt-auto pt-4 border-t border-border-color">
        <a href="war.html" class="nav-item text-red"><i data-lucide="sword"></i> Modo Guerra</a>
      </div>
    </nav>
  </aside>

  <!-- CONTENT -->
  <div class="container sidebar-open-padding pt-20 lg:pt-8" id="main-container">
    <header class="mb-8">
      <h1 class="text-huge">SISTEMA DE MISIONES</h1>
      <p class="text-muted">No tareas. Misiones estratétegicas para tu progreso real.</p>
    </header>

    <div class="flex-col gap-6 max-w-2xl">
      <section class="card">
        <div class="card-header">
          <h3 class="card-title flex items-center gap-2"><i data-lucide="target"></i> Misiones Activas</h3>
          <button class="btn-icon"><i data-lucide="plus"></i></button>
        </div>
        <div id="missions-list">
           <!-- Renderizado por JS -->
        </div>
      </section>
      
      <section class="card mt-6">
        <h3 class="card-title mb-4">Estadísticas de Cumplimiento</h3>
        <div class="flex items-center gap-4">
          <div class="flex-1">
             <div class="text-small mb-1">Efectividad Semanal</div>
             <div class="progress-bar-container"><div class="progress-bar" style="width: 75%; background-color: var(--accent-green)"></div></div>
          </div>
          <div class="text-title text-accent-green">75%</div>
        </div>
      </section>
    </div>
  </div>

  <!-- GEMINI PANEL -->
  <div id="loading" class="flex items-center justify-center h-screen w-full fixed top-0 left-0 bg-base z-50">
<i data-lucide="loader-2" class="spin text-muted" style="width: 48px; height: 48px;"></i></div>

  <script type="module" src="app.js"></script>
</body>
</html>
